name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate data schemas
        run: node scripts/validate-data.mjs

      - name: Build SDK and CLI
        run: npx turbo build --filter=@eu-ai-act/sdk --filter=@eu-ai-act/cli

      - name: Run tests
        run: npx turbo test --filter=@eu-ai-act/sdk

      - name: Type-check SDK
        run: npx turbo lint --filter=@eu-ai-act/sdk --filter=@eu-ai-act/cli

  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SDK (required by web)
        run: npx turbo build --filter=@eu-ai-act/sdk

      - name: Type-check web
        run: cd packages/web && npx tsc --noEmit
